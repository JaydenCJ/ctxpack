<svg xmlns="http://www.w3.org/2000/svg" width="860" height="560" viewBox="0 0 860 560" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="12">
  <rect width="860" height="560" rx="10" fill="#0d1117"/>
  <rect width="860" height="34" rx="10" fill="#161b22"/>
  <circle cx="20" cy="17" r="6" fill="#ff5f57"/>
  <circle cx="40" cy="17" r="6" fill="#febc2e"/>
  <circle cx="60" cy="17" r="6" fill="#28c840"/>
  <text x="430" y="21" fill="#8b949e" text-anchor="middle">ctxpack — every eviction has a reason</text>

  <text x="24" y="62" fill="#7ee787">$ ctxpack explain examples/agent-chat.json</text>
  <text x="24" y="82" fill="#8b949e" xml:space="preserve">ctxpack 0.1.0 — packing decisions</text>
  <text x="24" y="106" fill="#c9d1d9" xml:space="preserve">budget 150 · reserve 16 · capacity 134 · used 133 · free 1 · fits yes</text>
  <text x="24" y="126" fill="#c9d1d9" xml:space="preserve">fingerprint 1c54b232b00ed107</text>

  <text x="24" y="152" fill="#c9d1d9" xml:space="preserve">KEPT (3)</text>
  <text x="24" y="172" fill="#c9d1d9" xml:space="preserve">  <tspan fill="#28c840">= system</tspan>     pinned    30 tokens</text>
  <text x="24" y="192" fill="#c9d1d9" xml:space="preserve">  <tspan fill="#28c840">= tool-logs</tspan>  p=5       68 tokens</text>
  <text x="24" y="212" fill="#c9d1d9" xml:space="preserve">  <tspan fill="#28c840">= question</tspan>   pinned    13 tokens</text>
  <text x="24" y="232" fill="#c9d1d9" xml:space="preserve">TRUNCATED (1)</text>
  <text x="24" y="252" fill="#c9d1d9" xml:space="preserve">  <tspan fill="#d29922">~ history-2</tspan>  p=2       29 -&gt; 19 tokens  [budget] truncate-tail 29 -&gt; 19 tokens (over capacity by 9)</text>
  <text x="24" y="272" fill="#c9d1d9" xml:space="preserve">EVICTED (2)</text>
  <text x="24" y="292" fill="#c9d1d9" xml:space="preserve">  <tspan fill="#f85149">- history-1</tspan>  p=1       35 tokens  [group-quota] group "history" over quota (64 &gt; 40); lowest priority (p=1)</text>
  <text x="24" y="312" fill="#c9d1d9" xml:space="preserve">  <tspan fill="#f85149">- scratch</tspan>    p=0       21 tokens  [budget] over capacity by 31; lowest priority (p=0) among unpinned</text>

  <text x="24" y="352" fill="#7ee787">$ ctxpack fingerprint examples/agent-chat.json   <tspan fill="#8b949e"># same spec, same hash, any machine</tspan></text>
  <text x="24" y="372" fill="#c9d1d9" xml:space="preserve">1c54b232b00ed107</text>

  <text x="24" y="412" fill="#7ee787">$ ctxpack check examples/agent-chat.json   <tspan fill="#8b949e"># the CI gate fails closed on any loss</tspan></text>
  <text x="24" y="432" fill="#c9d1d9" xml:space="preserve">ctxpack check: 3 kept, 1 truncated, 2 evicted · 133/134 tokens · fits yes</text>
  <text x="24" y="452" fill="#c9d1d9" xml:space="preserve">  <tspan fill="#f85149">FAIL</tspan> 2 evicted (history-1, scratch)</text>
  <text x="24" y="472" fill="#c9d1d9" xml:space="preserve">  <tspan fill="#f85149">FAIL</tspan> 1 truncated (history-2)</text>
  <text x="24" y="492" fill="#f85149" xml:space="preserve">FAIL</text>
  <text x="24" y="512" fill="#8b949e" xml:space="preserve">$ echo $?   <tspan fill="#c9d1d9">1</tspan></text>

  <text x="24" y="540" fill="#8b949e">$ ctxpack check examples/agent-chat.json --allow truncate,evict   <tspan fill="#28c840"># PASS — losses accepted deliberately</tspan></text>
</svg>
